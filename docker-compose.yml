version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ufie-db
    environment:
      POSTGRES_USER: ufie_user
      POSTGRES_PASSWORD: ufie_pass
      POSTGRES_DB: ufie_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ufie_user -d ufie_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ufie-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ufie-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ufie_user:ufie_pass@db:5432/ufie_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CITY_NAME: Delhi
      CITY_CENTER_LAT: "28.6139"
      CITY_CENTER_LNG: "77.2090"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: ufie-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
